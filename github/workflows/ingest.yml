name: Ingest Esports Data

on:
  schedule:
    - cron: "0 */2 * * *" # Every 2 hours
  workflow_dispatch: # Manual trigger for testing

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Ingestion Pipeline
        run: |
          cd ingestion
          go mod tidy
          go run ./cmd/ingestion/
        env:
          ESPORTS_API_BASE_URL: https://api.pandascore.co
          ESPORTS_API_KEY: ${{ secrets.ESPORTS_API_KEY }}
          ASTRA_DB_TOKEN: ${{ secrets.ASTRA_DB_TOKEN }}
          ASTRA_DB_ID: ${{ secrets.ASTRA_DB_ID }}
          QSTASH_URL: ${{ secrets.QSTASH_URL }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
